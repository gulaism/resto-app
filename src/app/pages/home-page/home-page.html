<div class="home">
    <div class="left">
        <div class="head">
            <div class="restoNameAndDate">
                <div class="restoName">Jaegar Resto</div>
                <div class="todaysDate">{{today | date:'EEEE, d MMM y'}}</div>
            </div>
            <div class="search">
                <div class="searchIcon"><img class="searchIconImg" src="../../../assets/search.svg" alt="Search input">
                </div>
                <input class="searchInput" placeholder="Search for food, coffee, etc..." type="search" name="" id="">
            </div>
        </div>
        <div class="categories">
            <div class="category" [class.activeCat]="activeCat() === 'hot dishes'" (click)="activeCat.set('hot dishes')">Hot Dishes</div>
            <div class="category" [class.activeCat]="activeCat() === 'cold dishes'" (click)="activeCat.set('cold dishes')">Cold Dishes</div>
            <div class="category" [class.activeCat]="activeCat() === 'soup'" (click)="activeCat.set('soup')">Soup</div>
        </div>
        <div class="parag">Choose Dishes</div>
        <div>
            
        </div>
    </div>
    <div class="right">right</div>
</div>
