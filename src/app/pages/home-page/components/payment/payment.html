<div class="paymentDiv">
    <div class="backButton" (click)="goBack.emit()"><img class="backButtonImg" src="../../../../../assets/Back.svg" alt="Go back to orders"></div>
    <div class="paymentHead">Confirmation</div>
    <div class="paymentInfo">1 payment method available</div>
    <div class="methodHead">Payment Method</div>
    <div class="paymentMethods">
        <div class="crCard" [class.activeMethod]="chosenMethod() === 'creditCard'" (click)="chosenMethod.set('creditCard')">
            <div class="methodIcon"><img class="methodIconImg" src="../../../../../assets/Card.svg" alt="Pay with Credit Card"></div>
            <div>Credit Card</div>
            @if (chosenMethod() === 'creditCard') {
                <div class="checkMark"><img class="checkMarkImg" src="../../../../../assets/checkmark-circle.svg" alt=""></div>
            }
        </div>
        <div class="crCard" [class.activeMethod]="chosenMethod() === 'paypal'" (click)="chosenMethod.set('paypal')">
            <div class="methodIcon"><img class="methodIconImg" src="../../../../../assets/Paypal.svg" alt="Pay with Paypal"></div>
            <div>Paypal</div>
            @if (chosenMethod() === 'paypal') {
                <div class="checkMark"><img class="checkMarkImg" src="../../../../../assets/checkmark-circle.svg" alt=""></div>
            }
        </div><div class="crCard" [class.activeMethod]="chosenMethod() === 'cash'" (click)="chosenMethod.set('cash')">
            <div class="methodIcon"><img class="methodIconImg" src="../../../../../assets/Wallet.svg" alt="Pay cash"></div>
            <div>Cash</div>
            @if (chosenMethod() === 'cash') {
                <div class="checkMark"><img class="checkMarkImg" src="../../../../../assets/checkmark-circle.svg" alt=""></div>
            }
        </div>
    </div>
    <div class="cardHolder">Cardholder Name</div>
    <div class="cardInput">
        <app-input placeholder="Levi Ackerman" />
    </div>
    <div class="cardHolder">Card Number</div>
    <div class="cardNumberInput">
        <app-input [isCardInput]="true" [maxLength]="19" placeholder="1234 5678 9012 3456" />
    </div>
    <div class="cardDetails">
        <div class="expDate">
            <div class="detailHead">Expiration Date</div>
            <app-input [isExpiryInput]="true" placeholder="04/26" />
        </div>
        <div class="expDate">
            <div class="detailHead">CVV</div>
            <app-input [isCvvInput]="true" inputType="password" placeholder="123" />
        </div>
    </div>
</div>
